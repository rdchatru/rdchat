name: build mobile android

on:
  pull_request:
    types: [opened, reopened, synchronize]
    paths:
      - '.github/workflows/build-mobile-android.yaml'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - 'fluxer_mobile/**'
      - 'fluxer_app/**'
      - 'packages/**'
      - 'config/config.test.json'
  workflow_dispatch:
    inputs:
      ref:
        description: Git ref to build (branch, tag, or commit SHA)
        required: false
        default: ''
        type: string
      release_channel:
        description: Release channel injected into the frontend build
        required: false
        default: nightly
        type: choice
        options:
          - nightly
          - canary
          - stable
      build_type:
        description: Android build type
        required: false
        default: debug
        type: choice
        options:
          - debug
          - release
      fluxer_config:
        description: Config JSON path used to build fluxer_app
        required: false
        default: config/config.test.json
        type: string

permissions:
  contents: read

concurrency:
  group: mobile-android-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build Android (${{ github.event_name == 'workflow_dispatch' && inputs.build_type || 'debug' }})
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    env:
      FLUXER_CONFIG: ${{ github.event_name == 'workflow_dispatch' && inputs.fluxer_config || 'config/config.test.json' }}
      RELEASE_CHANNEL: ${{ github.event_name == 'workflow_dispatch' && inputs.release_channel || 'nightly' }}
      RUST_BACKTRACE: 1
      CARGO_TERM_COLOR: always
      GRADLE_OPTS: -Dorg.gradle.jvmargs=-Xmx4g -Dorg.gradle.daemon=false
    steps:
      - name: Checkout source
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.ref || '' }}

      - name: Set up pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'pnpm'

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept Android SDK licenses and install Android packages
        shell: bash
        run: |
          { yes || true; } | sdkmanager --licenses >/dev/null
          sdkmanager \
            "platform-tools" \
            "platforms;android-34" \
            "build-tools;34.0.0" \
            "ndk;27.0.12077973"

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,i686-linux-android,x86_64-linux-android

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            fluxer_mobile/src-tauri -> target

      - name: Cache Gradle dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-mobile-${{ hashFiles('pnpm-lock.yaml', 'fluxer_mobile/package.json', 'fluxer_mobile/src-tauri/tauri.conf.json') }}
          restore-keys: |
            ${{ runner.os }}-gradle-mobile-

      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile

      - name: Initialize Tauri Android project
        run: pnpm --filter fluxer_mobile android:init:ci

      - name: Prepare Android signing
        if: github.event_name == 'workflow_dispatch' && inputs.build_type == 'release'
        shell: bash
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          ANDROID_STORE_PASSWORD: ${{ secrets.ANDROID_STORE_PASSWORD }}
        run: |
          test -n "$ANDROID_KEYSTORE_BASE64"
          test -n "$ANDROID_KEY_ALIAS"
          test -n "$ANDROID_KEY_PASSWORD"
          printf '%s' "$ANDROID_KEYSTORE_BASE64" | base64 --decode > fluxer_mobile/src-tauri/gen/android/rdchat-upload.jks
          pnpm --filter fluxer_mobile android:signing:ci

      - name: Build Android debug app
        if: github.event_name != 'workflow_dispatch' || inputs.build_type == 'debug'
        run: pnpm --filter fluxer_mobile android:build:debug

      - name: Build Android release app
        if: github.event_name == 'workflow_dispatch' && inputs.build_type == 'release'
        run: pnpm --filter fluxer_mobile android:build

      - name: Upload Android artifacts
        uses: actions/upload-artifact@v4
        with:
          name: rdchat-android-${{ github.event_name == 'workflow_dispatch' && inputs.build_type || 'debug' }}
          if-no-files-found: error
          path: |
            fluxer_mobile/src-tauri/gen/android/app/build/outputs/**/*.apk
            fluxer_mobile/src-tauri/gen/android/app/build/outputs/**/*.aab
            fluxer_mobile/src-tauri/gen/android/app/build/outputs/**/mapping.txt
