account_disabled_suspicious:
  subject: RdChatアカウントを一時的に無効にしました
  body: |-
    {username}さん、こんにちは。

    不審な動きを確認したため、あなたのRdChatアカウントを一時的に無効にしました。

    {reason, select,
      null {}
      other {理由: {reason}}
    }

    再びアカウントを利用するには、パスワードのリセットが必要です。

    {forgotUrl}

    パスワードをリセットすると、再度ログインできるようになります。

    心当たりがない場合は、サポートまでご連絡ください。

    – RdChat安全チーム
account_scheduled_deletion:
  subject: RdChatアカウントの削除が予定されています
  body: |-
    {username}さん、こんにちは。

    利用規約またはコミュニティガイドラインへの違反が確認されたため、あなたのRdChatアカウントは永久削除の対象として削除が予定されています。

    削除予定日時: {deletionDate, date, full} {deletionDate, time, short}

    {reason, select,
      null {}
      other {理由: {reason}}
    }

    これは重大な対応です。予定日時になると、アカウントデータは完全に削除されます。

    こちらをご確認ください:
    - 利用規約: {termsUrl}
    - コミュニティガイドライン: {guidelinesUrl}

    異議申し立て:
    この対応が誤り、または正当ではないと思われる場合は、60日以内にこのメールアドレスから appeals@RdChat.app へ異議申し立てを送信してください。

    異議申し立てには、以下を含めてください:
    - なぜ誤り、または正当ではないと思うのかを具体的に説明してください
    - 関連する証拠や状況があれば添えてください

    RdChat安全チームが内容を確認し、最終判断が出るまで削除を一時停止する場合があります。

    – RdChat安全チーム
account_temp_banned:
  subject: RdChatアカウントを一時停止しました
  body: |-
    {username}さん、こんにちは。

    利用規約またはコミュニティガイドラインへの違反が確認されたため、あなたのRdChatアカウントは一時停止されました。

    停止期間: {durationHours, plural,
      =1 {1時間}
      other {#時間}
    }
    停止解除予定: {bannedUntil, date, full} {bannedUntil, time, short}

    {reason, select,
      null {}
      other {理由: {reason}}
    }

    停止期間中は、アカウントにアクセスできません。

    こちらをご確認ください:
    - 利用規約: {termsUrl}
    - コミュニティガイドライン: {guidelinesUrl}

    この対応が誤り、または正当ではないと思われる場合は、このメールアドレスから appeals@RdChat.app へ異議申し立てを送信してください。なぜ誤りだと思うのかを具体的に記載してください。内容を確認のうえ、結果を返信します。

    – RdChat安全チーム
donation_confirmation:
  subject: RdChatへのご寄付をいただきありがとうございます
  body: |-
    こんにちは、

    RdChatへのご寄付をいただきありがとうございます。{interval, select,
      month {定期的なご寄付}
      year {定期的なご寄付}
      other {1回限りのご寄付}
    }が{interval, select,
      month {正常に設定されました}
      year {正常に設定されました}
      other {正常に処理されました}
    }。

    寄付の詳細:
    金額: {amount} {currency} {interval, select,
      month {月額}
      year {年額}
      other {}
    }

    Stripeから領収書とインボイスPDFを記載したメールが別途送信されます。支払いに関する詳細がすべて含まれており、税務目的にもご利用いただけます。

    このリンクを使用して、寄付履歴の確認、インボイスのダウンロード、{interval, select,
      month {サブスクリプションの管理やキャンセル}
      year {サブスクリプションの管理やキャンセル}
      other {今後の寄付の管理}
    }がいつでも可能です。

    {manageUrl}

    RdChatを支えていただきありがとうございます!

    – RdChatチーム
donation_magic_link:
  subject: RdChatへの寄付を管理してください
  body: |-
    こんにちは、

    以下のリンクをクリックして、寄付者ポータルにアクセスしてください。

    {manageUrl}

    ポータルでは、サブスクリプションの管理、インボイスのダウンロード、寄付履歴の確認ができます。

    このリンクは {expiresAt, date, full} {expiresAt, time, short} まで有効です。

    心当たりがない場合は、このメールを無視してください。

    – RdChatチーム
dsa_report_verification:
  subject: DSA通報のためのメールアドレス確認
  body: |-
    こんにちは。

    RdChatでDigital Services Act (DSA) に基づく通報を送信するには、以下の確認コードを入力してください。

    {code}

    このコードは {expiresAt, date, full} {expiresAt, time, short} まで有効です。

    心当たりがない場合は、このメールを無視してください。

    – RdChat安全チーム
email_change_new:
  subject: 新しいRdChatメールアドレスを確認してください
  body: |-
    {username}さん、こんにちは。

    新しいRdChatメールアドレスを確認するには、アプリで以下のコードを入力してください。

    {code}

    このコードは {expiresAt, date, full} {expiresAt, time, short} まで有効です。

    心当たりがない場合は、このメールを無視してください。

    – RdChatチーム
email_change_original:
  subject: RdChatのメールアドレス変更を確認してください
  body: |-
    {username}さん、こんにちは。

    あなたのRdChatアカウントに登録されているメールアドレスを変更するリクエストを受け取りました。

    変更を確定するには、アプリで以下のコードを入力してください。

    {code}

    このコードは {expiresAt, date, full} {expiresAt, time, short} まで有効です。

    心当たりがない場合は、すぐにアカウントのセキュリティをご確認ください。

    – RdChatチーム
email_change_revert:
  subject: RdChatのメールアドレスが変更されました
  body: |-
    {username}さん、こんにちは。

    あなたのRdChatアカウントのメールアドレスが {newEmail} に変更されました。

    あなたが変更した場合は、対応は不要です。心当たりがない場合は、以下のリンクから変更を取り消してアカウントを保護できます。

    {revertUrl}

    これにより、以前のメールアドレスに戻ります。また、すべての端末からログアウトされ、連携済みの電話番号は削除され、MFAは無効になり、新しいパスワードの設定が必要になります。

    – RdChat安全チーム
email_verification:
  subject: RdChatのメールアドレスを確認してください
  body: |-
    {username}さん、こんにちは。

    以下のリンクをクリックして、RdChatアカウントのメールアドレスを確認してください。

    {verifyUrl}

    RdChatアカウントを作成していない場合は、このメールを無視してください。

    このリンクは24時間で無効になります。

    – RdChatチーム
gift_chargeback_notification:
  subject: 引き換えたギフトの特典が取り消されました
  body: |-
    {username}さん、こんにちは。

    あなたが引き換えたギフトコードは、別の方が支払ったものです。その支払いが後から取り消されました (チャージバック)。

    そのため、ギフトを引き換えた際にアカウントに追加された特典を削除しました。

    誤りと思われる場合は、サポートまでご連絡ください。ギフトコードに関する情報と、引き換えた日時について分かる範囲でお知らせください。

    – RdChatチーム
harvest_completed:
  subject: RdChatのデータエクスポートをダウンロードできます
  body: |-
    {username}さん、こんにちは。

    データエクスポートの準備ができました。

    ダウンロードリンク:
    {downloadUrl}

    含まれるメッセージ数: {totalMessages, number}
    ファイルサイズ: {fileSizeMB, number} MB

    このリンクは {expiresAt, date, full} {expiresAt, time, short} まで有効です。

    心当たりがない場合は、すぐにパスワードを変更し、サポートまでご連絡ください。

    – RdChatチーム
inactivity_warning:
  subject: 非アクティブのためRdChatアカウントの削除が予定されています
  body: |-
    {username}さん、こんにちは。

    {lastActiveDate, date, full} 以降、あなたのRdChatアカウントでのアクティビティが確認できていません。

    {deletionDate, date, full} {deletionDate, time, short} までにログインがない場合、非アクティブのためアカウントは永久に削除されます。

    こちらからログイン:
    {loginUrl}

    最近RdChatを利用している場合は、すぐにサポートまでご連絡ください。

    – RdChatチーム
ip_authorization:
  subject: 新しいIPアドレスからのログインを許可してください
  body: |-
    {username}さん、こんにちは。

    あなたのRdChatアカウントで、新しいIPアドレスからのログイン試行を検知しました。

    IPアドレス: {ipAddress}
    場所: {location}

    あなた自身の操作であれば、以下のリンクをクリックしてこのIPアドレスを許可してください。

    {authUrl}

    心当たりがない場合は、すぐにパスワードを変更してください。

    この許可リンクは30分で無効になります。

    – RdChatチーム
password_change_verification:
  subject: RdChatのパスワード変更を確認してください
  body: |-
    {username}さん、こんにちは。

    あなたのRdChatアカウントのパスワードを変更するリクエストを受け取りました。

    変更を確定するには、アプリで以下のコードを入力してください。

    {code}

    このコードは {expiresAt, date, full} {expiresAt, time, short} まで有効です。

    心当たりがない場合は、誰かがあなたのアカウントにアクセスしている可能性があります。すぐにパスワードを変更し、二段階認証を有効にしてください。

    – RdChatチーム
password_reset:
  subject: RdChatのパスワードをリセットしてください
  body: |-
    {username}さん、こんにちは。

    RdChatのパスワードリセットがリクエストされました。以下のリンクから新しいパスワードを設定してください。

    {resetUrl}

    心当たりがない場合は、このメールを無視してください。

    このリンクは1時間で無効になります。

    – RdChatチーム
registration_approved:
  subject: RdChatの登録が承認されました
  body: |-
    {username}さん、こんにちは。

    RdChatの登録が承認されました。

    こちらからRdChatアプリにログインできます:
    {channelsUrl}

    RdChatへようこそ。

    – RdChatチーム
report_resolved:
  subject: RdChatへの通報を確認しました
  body: |-
    {username}さん、こんにちは。

    あなたの通報 (ID: {reportId}) はRdChat安全チームが確認しました。

    安全チームからの回答:
    {publicComment}

    RdChatをみんなにとって安全な場所にするためのご協力ありがとうございます。私たちはすべての通報を真剣に確認しており、コミュニティへの貢献に感謝しています。

    この結果について質問や不安がある場合は、safety@RdChat.app までご連絡ください。

    – RdChat安全チーム
scheduled_deletion_notification:
  subject: RdChatアカウントの削除が予定されています
  body: |-
    {username}さん、こんにちは。

    あなたのRdChatアカウントは永久削除の対象として削除が予定されています。

    削除予定日時: {deletionDate, date, full} {deletionDate, time, short}

    {reason, select,
      null {}
      other {理由: {reason}}
    }

    これは重大な対応です。予定日時になると、アカウントデータは完全に削除されます。

    この対応が誤りだと思われる場合は、60日以内にこのメールアドレスから appeals@RdChat.app へ異議申し立てを送信できます。

    – RdChat安全チーム
self_deletion_scheduled:
  subject: RdChatアカウントの削除が予約されました
  body: |-
    {username}さん、こんにちは。

    RdChatアカウントの削除がリクエストされました。アカウントは次の日時に永久削除される予定です。

    {deletionDate, date, full} {deletionDate, time, short}

    心当たりがない場合は、アカウントにログインして削除をキャンセルしてください。あわせて、パスワードを変更してアカウントを保護することをおすすめします。

    – RdChatチーム
unban_notification:
  subject: RdChatアカウントの停止が解除されました
  body: |-
    {username}さん、こんにちは。

    あなたのRdChatアカウントの停止は解除されました。

    {reason, select,
      null {}
      other {理由: {reason}}
    }

    これで、再びアカウントにログインしてRdChatを利用できます。

    – RdChat安全チーム
