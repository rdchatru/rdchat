account_disabled_suspicious:
  subject: Твой аккаунт RdChat временно отключён
  body: |-
    Привет, {username}!

    Мы временно отключили твой аккаунт RdChat, потому что обнаружили подозрительную активность.

    {reason, select,
      null {}
      other {Причина: {reason}}
    }

    Чтобы восстановить доступ, сбрось пароль:

    {forgotUrl}

    После смены пароля ты снова сможешь войти.

    Если ты считаешь, что это произошло по ошибке, напиши в нашу поддержку.

    – команда безопасности RdChat
account_scheduled_deletion:
  subject: Твой аккаунт RdChat будет удалён
  body: |-
    Привет, {username}!

    Мы запланировали безвозвратное удаление твоего аккаунта RdChat из-за нарушений условий использования или правил сообщества.

    Дата удаления: {deletionDate, date, full} {deletionDate, time, short}

    {reason, select,
      null {}
      other {Причина: {reason}}
    }

    Это серьёзная мера. Данные аккаунта будут навсегда удалены в указанную дату.

    Пожалуйста, ознакомься:
    - Условия использования: {termsUrl}
    - Правила сообщества: {guidelinesUrl}

    Апелляция:
    Если ты считаешь, что решение было неверным или необоснованным, ты можешь подать апелляцию в течение 60 дней. Отправь письмо на appeals@RdChat.app, и важно, чтобы оно было отправлено с этого e-mail адреса.

    В апелляции:
    - Чётко объясни, почему ты считаешь решение неверным или необоснованным
    - Приложи любые релевантные доказательства или дополнительный контекст, если есть

    Участник команды безопасности RdChat рассмотрит апелляцию и может приостановить запланированное удаление до принятия окончательного решения.

    – команда безопасности RdChat
account_temp_banned:
  subject: Твой аккаунт RdChat временно приостановлен
  body: |-
    Привет, {username}!

    Мы временно приостановили твой аккаунт RdChat за нарушение условий использования или правил сообщества.

    Длительность: {durationHours, plural,
      one {# час}
      few {# часа}
      many {# часов}
      other {# часа}
    }
    Приостановка до: {bannedUntil, date, full} {bannedUntil, time, short}

    {reason, select,
      null {}
      other {Причина: {reason}}
    }

    На это время доступ к аккаунту будет закрыт.

    Пожалуйста, ознакомься:
    - Условия использования: {termsUrl}
    - Правила сообщества: {guidelinesUrl}

    Если ты считаешь, что решение было неверным или необоснованным, ты можешь подать апелляцию: отправь письмо на appeals@RdChat.app, и важно, чтобы оно было отправлено с этого e-mail адреса. Чётко объясни, почему ты считаешь решение неверным. Мы рассмотрим апелляцию и сообщим итоговое решение.

    – команда безопасности RdChat
donation_confirmation:
  subject: Спасибо за пожертвование в RdChat
  body: |-
    Привет!

    Спасибо за пожертвование в RdChat! Твоё {interval, select,
      month {регулярное пожертвование}
      year {регулярное пожертвование}
      other {разовое пожертвование}
    } успешно {interval, select,
      month {настроено}
      year {настроено}
      other {обработано}
    }.

    Детали пожертвования:
    Сумма: {amount} {currency} {interval, select,
      month {в месяц}
      year {в год}
      other {}
    }

    Stripe скоро отправит тебе отдельное письмо с квитанцией и PDF-счётом. Там будут все платёжные детали, и документ можно использовать для налоговых целей.

    Ты можешь в любое время посмотреть историю пожертвований, скачать счета{interval, select,
      month {, а также управлять или отменить подписку}
      year {, а также управлять или отменить подписку}
      other { и управлять будущими пожертвованиями}
    }, используя эту ссылку:

    {manageUrl}

    Твоя поддержка помогает RdChat работать. Спасибо!

    – команда RdChat
donation_magic_link:
  subject: Управляй своими пожертвованиями в RdChat
  body: |-
    Привет!

    Нажми на ссылку ниже, чтобы получить доступ к порталу для доноров:

    {manageUrl}

    В портале ты можешь управлять подписками, скачивать счета и смотреть историю пожертвований.

    Ссылка истекает {expiresAt, date, full} в {expiresAt, time, short}.

    Если ты этого не запрашивал(а), можешь спокойно проигнорировать это письмо.

    – команда RdChat
dsa_report_verification:
  subject: Подтверди e-mail для жалобы по DSA
  body: |-
    Привет!

    Используй код ниже, чтобы отправить жалобу по Digital Services Act (DSA) в RdChat:

    {code}

    Код истекает {expiresAt, date, full} в {expiresAt, time, short}.

    Если ты этого не запрашивал(а), просто проигнорируй это письмо.

    – команда безопасности RdChat
email_change_new:
  subject: Подтверди новый e-mail для RdChat
  body: |-
    Привет, {username}!

    Введи этот код в приложении, чтобы подтвердить новый e-mail для RdChat:

    {code}

    Код истекает {expiresAt, date, full} в {expiresAt, time, short}.

    Если ты этого не запрашивал(а), просто проигнорируй это письмо.

    – команда RdChat
email_change_original:
  subject: Подтверди смену e-mail в RdChat
  body: |-
    Привет, {username}!

    Мы получили запрос на смену e-mail в твоём аккаунте RdChat.

    Чтобы подтвердить смену, введи этот код в приложении:

    {code}

    Код истекает {expiresAt, date, full} в {expiresAt, time, short}.

    Если ты этого не запрашивал(а), срочно обезопась свой аккаунт.

    – команда RdChat
email_change_revert:
  subject: E-mail твоего аккаунта RdChat изменён
  body: |-
    Привет, {username}!

    E-mail твоего аккаунта RdChat был изменён на {newEmail}.

    Если это сделал(а) ты, ничего делать не нужно. Если нет, ты можешь отменить изменение и обезопасить аккаунт по ссылке:

    {revertUrl}

    Это вернёт предыдущий e-mail, выполнит выход из аккаунта на всех устройствах, удалит привязанные номера телефонов, отключит MFA и потребует задать новый пароль.

    – команда безопасности RdChat
email_verification:
  subject: Подтверди e-mail для RdChat
  body: |-
    Привет, {username}!

    Подтверди e-mail для твоего аккаунта RdChat, перейдя по ссылке ниже:

    {verifyUrl}

    Если ты не создавал(а) аккаунт RdChat, можешь спокойно проигнорировать это письмо.

    Ссылка будет действовать 24 часа.

    – команда RdChat
gift_chargeback_notification:
  subject: Бонусы за активированный подарок были удалены
  body: |-
    Привет, {username}!

    Подарочный код, который ты активировал(а), изначально был оплачен другим человеком. Затем платёж был оспорен и возвращён (чарджбэк).

    Поэтому мы удалили бонусы, которые были добавлены в твой аккаунт при активации подарка.

    Если ты считаешь, что это ошибка, напиши в поддержку и добавь любые детали, которые у тебя есть о подарочном коде и о том, когда ты его активировал(а).

    – команда RdChat
harvest_completed:
  subject: Твой экспорт данных RdChat готов к скачиванию
  body: |-
    Привет, {username}!

    Твой экспорт данных готов.

    Ссылка для скачивания:
    {downloadUrl}

    Сообщений включено: {totalMessages, number}
    Размер файла: {fileSizeMB, number} MB

    Ссылка истекает {expiresAt, date, full} в {expiresAt, time, short}.

    Если ты не запрашивал(а) этот экспорт, срочно смени пароль и напиши в поддержку.

    – команда RdChat
inactivity_warning:
  subject: Твой аккаунт RdChat будет удалён из-за неактивности
  body: |-
    Привет, {username}!

    Мы не видели активности в твоём аккаунте RdChat с {lastActiveDate, date, full}.

    Если ты не войдёшь до {deletionDate, date, full} в {deletionDate, time, short}, твой аккаунт будет безвозвратно удалён из-за неактивности.

    Войти можно здесь:
    {loginUrl}

    Если ты недавно пользовался(лась) RdChat, срочно напиши в поддержку.

    – команда RdChat
ip_authorization:
  subject: Подтверди вход с нового IP-адреса
  body: |-
    Привет, {username}!

    Мы заметили попытку входа в твой аккаунт RdChat с нового IP-адреса:

    IP-адрес: {ipAddress}
    Местоположение: {location}

    Если это был(а) ты, подтверди этот IP-адрес по ссылке ниже:

    {authUrl}

    Если ты не пытал(а)ся войти, срочно смени пароль.

    Ссылка для подтверждения будет действовать 30 минут.

    – команда RdChat
password_change_verification:
  subject: Подтверди смену пароля в RdChat
  body: |-
    Привет, {username}!

    Мы получили запрос на смену пароля в твоём аккаунте RdChat.

    Чтобы подтвердить смену, введи этот код в приложении:

    {code}

    Код истекает {expiresAt, date, full} в {expiresAt, time, short}.

    Если ты этого не запрашивал(а), возможно, кто-то получил доступ к твоему аккаунту. Срочно смени пароль и включи двухфакторную аутентификацию.

    – команда RdChat
password_reset:
  subject: Сброс пароля RdChat
  body: |-
    Привет, {username}!

    Ты запросил(а) сброс пароля RdChat. Перейди по ссылке ниже, чтобы задать новый пароль:

    {resetUrl}

    Если ты не запрашивал(а) сброс пароля, можешь спокойно проигнорировать это письмо.

    Ссылка будет действовать 1 час.

    – команда RdChat
registration_approved:
  subject: Твоя регистрация в RdChat одобрена
  body: |-
    Привет, {username}!

    Хорошие новости: твою регистрацию в RdChat одобрили.

    Теперь ты можешь войти в приложение RdChat здесь:
    {channelsUrl}

    Добро пожаловать в сообщество RdChat.

    – команда RdChat
report_resolved:
  subject: Твою жалобу в RdChat рассмотрели
  body: |-
    Привет, {username}!

    Твоя жалоба (ID: {reportId}) была рассмотрена нашей командой безопасности.

    Ответ от команды безопасности:
    {publicComment}

    Спасибо, что помогаешь делать RdChat безопаснее для всех. Мы серьёзно относимся ко всем жалобам и ценим твой вклад в сообщество.

    Если у тебя есть вопросы или сомнения по итогам, напиши на safety@RdChat.app.

    – команда безопасности RdChat
scheduled_deletion_notification:
  subject: Твой аккаунт RdChat будет удалён
  body: |-
    Привет, {username}!

    Мы запланировали безвозвратное удаление твоего аккаунта RdChat.

    Дата удаления: {deletionDate, date, full} {deletionDate, time, short}

    {reason, select,
      null {}
      other {Причина: {reason}}
    }

    Это серьёзная мера. Данные аккаунта будут навсегда удалены в указанную дату.

    Если ты считаешь, что решение было неверным, ты можешь подать апелляцию: отправь письмо на appeals@RdChat.app, и важно, чтобы оно было отправлено с этого e-mail адреса.

    – команда безопасности RdChat
self_deletion_scheduled:
  subject: Удаление твоего аккаунта RdChat запланировано
  body: |-
    Привет, {username}!

    Ты запросил(а) удаление аккаунта RdChat. Твой аккаунт будет безвозвратно удалён:

    {deletionDate, date, full} в {deletionDate, time, short}

    Если ты этого не запрашивал(а), войди в аккаунт, чтобы отменить удаление. Мы также рекомендуем сменить пароль, чтобы обезопасить аккаунт.

    – команда RdChat
unban_notification:
  subject: Блокировка твоего аккаунта RdChat снята
  body: |-
    Привет, {username}!

    Хорошие новости: блокировка твоего аккаунта RdChat снята.

    {reason, select,
      null {}
      other {Причина: {reason}}
    }

    Теперь ты снова можешь войти в аккаунт и продолжить пользоваться RdChat.

    – команда безопасности RdChat
