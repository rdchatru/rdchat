account_disabled_suspicious:
  subject: Tavo RdChat paskyra laikinai išjungta
  body: |-
    Labas, {username},

    Tavo RdChat paskyra laikinai išjungta, nes užfiksavome įtartiną veiklą.

    {reason, select,
      null {}
      other {Priežastis: {reason}}
    }

    Kad vėl galėtum naudotis paskyra, nustatyk slaptažodį iš naujo:

    {forgotUrl}

    Po to galėsi vėl prisijungti.

    Jei manai, kad tai įvyko per klaidą, susisiek su mūsų pagalbos komanda.

    – RdChat saugumo komanda
account_scheduled_deletion:
  subject: Tavo RdChat paskyra bus ištrinta
  body: |-
    Labas, {username},

    Tavo RdChat paskyros ištrynimas visam laikui buvo suplanuotas, nes pažeidei mūsų paslaugų teikimo sąlygas arba bendruomenės gaires.

    Numatyta ištrynimo data: {deletionDate, date, full} {deletionDate, time, short}

    {reason, select,
      null {}
      other {Priežastis: {reason}}
    }

    Tai rimta priemonė. Tavo paskyros duomenys bus negrįžtamai ištrinti nurodytą dieną.

    Peržiūrėk:
    - Paslaugų teikimo sąlygas: {termsUrl}
    - Bendruomenės gaires: {guidelinesUrl}

    Apeliacija:
    Jei manai, kad šis sprendimas neteisingas arba nepagrįstas, per 60 dienų gali pateikti apeliaciją el. paštu appeals@RdChat.app, ir tai turi būti padaryta iš šio el. pašto adreso.

    Apeliacijoje:
    - Aiškiai paaiškink, kodėl manai, kad sprendimas neteisingas arba nepagrįstas
    - Jei įmanoma, pateik susijusius įrodymus ar papildomą kontekstą

    RdChat saugumo komandos narys peržiūrės tavo apeliaciją ir gali sustabdyti planuojamą ištrynimą, kol bus priimtas galutinis sprendimas.

    – RdChat saugumo komanda
account_temp_banned:
  subject: Tavo RdChat paskyra laikinai sustabdyta
  body: |-
    Labas, {username},

    Tavo RdChat paskyra laikinai sustabdyta, nes pažeidei mūsų paslaugų teikimo sąlygas arba bendruomenės gaires.

    Trukmė: {durationHours, plural,
      =1 {1 valanda}
      other {# valandos}
    }
    Sustabdyta iki: {bannedUntil, date, full} {bannedUntil, time, short}

    {reason, select,
      null {}
      other {Priežastis: {reason}}
    }

    Šiuo laikotarpiu negalėsi prisijungti prie savo paskyros.

    Peržiūrėk:
    - Paslaugų teikimo sąlygas: {termsUrl}
    - Bendruomenės gaires: {guidelinesUrl}

    Jei manai, kad šis sprendimas neteisingas arba nepagrįstas, gali pateikti apeliaciją el. paštu appeals@RdChat.app, ir tai turi būti padaryta iš šio el. pašto adreso. Aiškiai paaiškink, kodėl manai, kad sprendimas klaidingas. Apeliaciją peržiūrėsime ir informuosime apie galutinį sprendimą.

    – RdChat saugumo komanda
donation_confirmation:
  subject: Ačiū už jūsų auką RdChat
  body: |-
    Sveikas,

    Ačiū už jūsų auką RdChat! Jūsų {interval, select,
      month {pasikartojanti auka}
      year {pasikartojanti auka}
      other {vienkartinė auka}
    } buvo sėkmingai {interval, select,
      month {nustatyta}
      year {nustatyta}
      other {apdorota}
    }.

    Aukos detalės:
    Suma: {amount} {currency} {interval, select,
      month {per mėnesį}
      year {per metus}
      other {}
    }

    Stripe netrukus atsiųs jums atskirą kvitą su sąskaitos PDF. Jame yra visi mokėjimo duomenys ir jis gali būti naudojamas mokesčių tikslais.

    Galite peržiūrėti aukų istoriją, atsisiųsti sąskaitas, {interval, select,
      month {ir valdyti arba atšaukti prenumeratą}
      year {ir valdyti arba atšaukti prenumeratą}
      other {ir valdyti būsimas aukas}
    } bet kuriuo metu naudodami šią nuorodą:

    {manageUrl}

    Jūsų parama padeda RdChat veikti. Ačiū!

    – RdChat komanda
donation_magic_link:
  subject: Tvarkyk savo RdChat aukas
  body: |-
    Labas,

    Spustelėk žemiau esančią nuorodą, kad pasiektum donorų portalą:

    {manageUrl}

    Portale gali valdyti prenumeratas, atsisiųsti sąskaitas ir peržiūrėti aukų istoriją.

    Ši nuoroda galioja iki {expiresAt, date, full} {expiresAt, time, short}.

    Jei to neprašei, gali ramiai ignoruoti šį laišką.

    – RdChat komanda
dsa_report_verification:
  subject: Patvirtink el. paštą DSA pranešimui
  body: |-
    Labas,

    Naudok žemiau pateiktą kodą, kad pateiktum pranešimą pagal Skaitmeninių paslaugų aktą (DSA) per RdChat:

    {code}

    Kodas galioja iki {expiresAt, date, full} {expiresAt, time, short}.

    Jei to neprašei, gali ignoruoti šį laišką.

    – RdChat saugumo komanda
email_change_new:
  subject: Patvirtink naują RdChat el. pašto adresą
  body: |-
    Labas, {username},

    Įvesk šį kodą programėlėje, kad patvirtintum naują RdChat el. pašto adresą:

    {code}

    Kodas galioja iki {expiresAt, date, full} {expiresAt, time, short}.

    Jei to neprašei, gali ignoruoti šį laišką.

    – RdChat komanda
email_change_original:
  subject: Patvirtink RdChat el. pašto adreso pakeitimą
  body: |-
    Labas, {username},

    Gavome prašymą pakeisti el. pašto adresą tavo RdChat paskyroje.

    Kad patvirtintum pakeitimą, įvesk šį kodą programėlėje:

    {code}

    Kodas galioja iki {expiresAt, date, full} {expiresAt, time, short}.

    Jei to neprašei, nedelsdamas pasirūpink savo paskyros saugumu.

    – RdChat komanda
email_change_revert:
  subject: Pakeistas tavo RdChat el. pašto adresas
  body: |-
    Labas, {username},

    Tavo RdChat paskyros el. pašto adresas buvo pakeistas į {newEmail}.

    Jei tai darei tu, nieko daryti nereikia. Jei ne, gali atšaukti pakeitimą ir apsaugoti paskyrą paspaudęs šią nuorodą:

    {revertUrl}

    Tai atkurs ankstesnį el. pašto adresą, atjungs tave visuose įrenginiuose, pašalins susietus telefono numerius, išjungs MFA ir pareikalaus nustatyti naują slaptažodį.

    – RdChat saugumo komanda
email_verification:
  subject: Patvirtink savo RdChat el. pašto adresą
  body: |-
    Labas, {username},

    Patvirtink el. pašto adresą savo RdChat paskyrai paspaudęs žemiau esančią nuorodą:

    {verifyUrl}

    Jei RdChat paskyros nekūrei, gali ramiai ignoruoti šį laišką.

    Nuoroda galioja 24 valandas.

    – RdChat komanda
gift_chargeback_notification:
  subject: Pašalinti privalumai iš tavo panaudotos dovanos
  body: |-
    Labas, {username},

    Dovanos kodą, kurį panaudojai, iš pradžių apmokėjo kitas asmuo. Mokėjimas vėliau buvo atšauktas (chargeback).

    Dėl to pašalinome privalumus, kurie buvo pridėti prie tavo paskyros, kai panaudojai dovaną.

    Jei manai, kad tai klaida, susisiek su mūsų pagalbos komanda ir pateik visą informaciją, kurią turi apie dovanos kodą ir jo panaudojimo laiką.

    – RdChat komanda
harvest_completed:
  subject: Tavo RdChat duomenų eksportas paruoštas atsisiųsti
  body: |-
    Labas, {username},

    Tavo duomenų eksportas paruoštas.

    Atsisiuntimo nuoroda:
    {downloadUrl}

    Įtrauktos žinutės: {totalMessages, number}
    Failo dydis: {fileSizeMB, number} MB

    Nuoroda galioja iki {expiresAt, date, full} {expiresAt, time, short}.

    Jei šio eksporto neprašei, nedelsdamas pakeisk slaptažodį ir susisiek su mūsų pagalbos komanda.

    – RdChat komanda
inactivity_warning:
  subject: Tavo RdChat paskyra bus ištrinta dėl neaktyvumo
  body: |-
    Labas, {username},

    Nuo {lastActiveDate, date, full} nematėme jokios veiklos tavo RdChat paskyroje.

    Jei neprisijungsi iki {deletionDate, date, full} {deletionDate, time, short}, tavo paskyra bus negrįžtamai ištrinta dėl neaktyvumo.

    Prisijunk čia:
    {loginUrl}

    Jei RdChat naudojaisi neseniai, nedelsdamas susisiek su mūsų pagalbos komanda.

    – RdChat komanda
ip_authorization:
  subject: Patvirtink prisijungimą iš naujo IP adreso
  body: |-
    Labas, {username},

    Užfiksavome bandymą prisijungti prie tavo RdChat paskyros iš naujo IP adreso:

    IP adresas: {ipAddress}
    Vieta: {location}

    Jei tai buvai tu, patvirtink šį IP adresą paspaudęs žemiau esančią nuorodą:

    {authUrl}

    Jei tai buvai ne tu, nedelsdamas pasikeisk slaptažodį.

    Ši patvirtinimo nuoroda galioja 30 minučių.

    – RdChat komanda
password_change_verification:
  subject: Patvirtink savo RdChat slaptažodžio pakeitimą
  body: |-
    Labas, {username},

    Gavome prašymą pakeisti slaptažodį tavo RdChat paskyroje.

    Kad patvirtintum šį pakeitimą, įvesk šį kodą programėlėje:

    {code}

    Šis kodas galioja iki {expiresAt}.

    Jei to neprašei, gali būti, kad kas norsturi prieigą prie tavo paskyros. Nedelsdamas pakeisk slaptažodį ir įjunk dviejų veiksnių autentifikaciją.

    – RdChat komanda
password_reset:
  subject: Nustatyk iš naujo RdChat slaptažodį
  body: |-
    Labas, {username},

    Gavome prašymą nustatyti iš naujo tavo RdChat slaptažodį. Paspausk žemiau esančią nuorodą ir nustatyk naują slaptažodį:

    {resetUrl}

    Jei šio prašymo nepateikei, gali ramiai ignoruoti šį laišką.

    Ši nuoroda galioja 1 valandą.

    – RdChat komanda
registration_approved:
  subject: Tavo RdChat registracija patvirtinta
  body: |-
    Labas, {username},

    Gera žinia: tavo RdChat registracija patvirtinta.

    Dabar gali prisijungti prie RdChat programėlės čia:
    {channelsUrl}

    Sveikas atvykęs į RdChat bendruomenę.

    – RdChat komanda
report_resolved:
  subject: Tavo pranešimas peržiūrėtas
  body: |-
    Labas, {username},

    Tavo pranešimą (ID: {reportId}) peržiūrėjo mūsų saugumo komanda.

    Saugumo komandos atsakymas:
    {publicComment}

    Ačiū, kad padedi RdChat išlikti saugiam visiems. Į visus pranešimus žiūrime rimtai ir vertiname tavo indėlį į bendruomenę.

    Jei turi klausimų ar abejonių dėl šio sprendimo, parašyk safety@RdChat.app.

    – RdChat saugumo komanda
scheduled_deletion_notification:
  subject: Tavo RdChat paskyra bus ištrinta
  body: |-
    Labas, {username},

    Tavo RdChat paskyros ištrynimas visam laikui buvo suplanuotas.

    Numatyta ištrynimo data: {deletionDate, date, full} {deletionDate, time, short}

    {reason, select,
      null {}
      other {Priežastis: {reason}}
    }

    Tai rimta priemonė. Tavo paskyros duomenys bus negrįžtamai ištrinti nurodytą dieną.

    Jei manai, kad šis sprendimas neteisingas, gali pateikti apeliaciją el. paštu appeals@RdChat.app, ir tai turi būti padaryta iš šio el. pašto adreso.

    – RdChat saugumo komanda
self_deletion_scheduled:
  subject: Suplanuotas tavo RdChat paskyros ištrynimas
  body: |-
    Labas, {username},

    Paprašei ištrinti savo RdChat paskyrą. Tavo paskyra bus negrįžtamai ištrinta:

    {deletionDate, date, full} {deletionDate, time, short}

    Jei to neprašei, prisijunk prie savo paskyros, kad atšauktum ištrynimą. Taip pat rekomenduojame pakeisti slaptažodį, kad apsaugotum paskyrą.

    – RdChat komanda
unban_notification:
  subject: Tavo RdChat paskyros sustabdymas panaikintas
  body: |-
    Labas, {username},

    Gera žinia: tavo RdChat paskyros sustabdymas panaikintas.

    {reason, select,
      null {}
      other {Priežastis: {reason}}
    }

    Dabar gali vėl prisijungti prie paskyros ir toliau naudotis RdChat kaip įprastai.

    – RdChat saugumo komanda
