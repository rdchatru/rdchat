account_disabled_suspicious:
  subject: החשבון שלכם ב-RdChat הושבת זמנית
  body: |-
    היי {username},

    השבתנו זמנית את חשבון ה-RdChat שלכם בעקבות פעילות חשודה.

    {reason, select,
      null {}
      other {סיבה: {reason}}
    }

    כדי לקבל שוב גישה לחשבון, צריך לאפס את הסיסמה:

    {forgotUrl}

    אחרי איפוס הסיסמה תוכלו להתחבר שוב.

    אם נראה לכם שזו טעות, פנו לצוות התמיכה שלנו.

    – צוות הבטיחות של RdChat
account_scheduled_deletion:
  subject: החשבון שלכם ב-RdChat מיועד למחיקה
  body: |-
    היי {username},

    החשבון שלכם ב-RdChat סומן למחיקה לצמיתות בעקבות הפרה של תנאי השימוש או כללי הקהילה שלנו.

    תאריך מחיקה מתוכנן: {deletionDate, date, full} {deletionDate, time, short}

    {reason, select,
      null {}
      other {סיבה: {reason}}
    }

    זו פעולת אכיפה חמורה. נתוני החשבון שלכם יימחקו לצמיתות בתאריך שנקבע.

    מומלץ לעבור על:
    - תנאי השימוש: {termsUrl}
    - כללי הקהילה: {guidelinesUrl}

    תהליך ערעור:
    אם לדעתכם ההחלטה שגויה או לא מוצדקת, תוכלו להגיש ערעור בתוך 60 יום. שלחו אימייל ל-appeals@RdChat.app, והגישו אותו מכתובת האימייל הזו.

    בערעור:
    - הסבירו בבירור מדוע לדעתכם ההחלטה שגויה או לא מוצדקת
    - צרפו ראיות או הקשר רלוונטיים, אם יש

    נציג או נציגה מצוות הבטיחות של RdChat יבדקו את הערעור, וייתכן שהמחיקה המתוכננת תוקפא עד לקבלת החלטה סופית.

    – צוות הבטיחות של RdChat
account_temp_banned:
  subject: החשבון שלכם ב-RdChat הושעה זמנית
  body: |-
    היי {username},

    החשבון שלכם ב-RdChat הושעה זמנית בעקבות הפרה של תנאי השימוש או כללי הקהילה שלנו.

    משך: {durationHours, plural,
      =1 {שעה אחת}
      other {# שעות}
    }
    ההשעיה בתוקף עד: {bannedUntil, date, full} {bannedUntil, time, short}

    {reason, select,
      null {}
      other {סיבה: {reason}}
    }

    בזמן הזה לא תהיה לכם גישה לחשבון.

    מומלץ לעבור על:
    - תנאי השימוש: {termsUrl}
    - כללי הקהילה: {guidelinesUrl}

    אם לדעתכם ההחלטה שגויה או לא מוצדקת, תוכלו להגיש ערעור ל-appeals@RdChat.app מהכתובת הזו. הסבירו בבירור מדוע לדעתכם ההחלטה שגויה. נבדוק את הערעור ונחזור אליכם עם החלטה.

    – צוות הבטיחות של RdChat
donation_confirmation:
  subject: תודה על התרומה שלך ל-RdChat
  body: |-
    שלום,

    תודה על התרומה שלך ל-RdChat! {interval, select,
      month {התרומה החוזרת שלך}
      year {התרומה החוזרת שלך}
      other {התרומה החד-פעמית שלך}
    } {interval, select,
      month {הוגדרה}
      year {הוגדרה}
      other {עובדה}
    } בהצלחה.

    פרטי התרומה:
    סכום: {amount} {currency} {interval, select,
      month {לחודש}
      year {לשנה}
      other {}
    }

    Stripe ישלח לך אימייל נפרד עם קבלה והפקטורה שלך בפורמט PDF בקרוב. זה כולל את כל פרטי התשלום וניתן להשתמש בו למטרות מס.

    באפשרותך לצפות בהיסטוריית התרומות שלך, להוריד פקטורות, {interval, select,
      month {ולנהל או לבטל את המינוי שלך}
      year {ולנהל או לבטל את המינוי שלך}
      other {ולנהל תרומות עתידיות}
    } בכל עת באמצעות הקישור הזה:

    {manageUrl}

    התמיכה שלך עוזרת לשמור על RdChat פעיל. תודה!

    – צוות RdChat
donation_magic_link:
  subject: נהלו את התרומות שלכם ל-RdChat
  body: |-
    שלום,

    לחצו על הקישור שלמטה כדי לגשת לפורטל התורמים שלכם:

    {manageUrl}

    בפורטל, באפשרותכם לנהל מינויים, להוריד פקטורות, ולצפות בהיסטוריית התרומות שלכם.

    הקישור תקף עד {expiresAt, date, full} בשעה {expiresAt, time, short}.

    אם לא ביקשתם את הקישור הזה, תוכלו להתעלם מהאימייל בלי חשש.

    – צוות RdChat
dsa_report_verification:
  subject: אמתו את כתובת האימייל להגשת דיווח DSA
  body: |-
    היי,

    השתמשו בקוד שלמטה כדי להגיש דיווח לפי חוק השירותים הדיגיטליים (DSA) ב-RdChat:

    {code}

    הקוד תקף עד {expiresAt, date, full} בשעה {expiresAt, time, short}.

    אם לא ביקשתם זאת, תוכלו להתעלם מהאימייל הזה.

    – צוות הבטיחות של RdChat
email_change_new:
  subject: אמתו את כתובת האימייל החדשה שלכם ב-RdChat
  body: |-
    היי {username},

    הזינו את הקוד הזה באפליקציה כדי לאמת את כתובת האימייל החדשה שלכם ב-RdChat:

    {code}

    הקוד תקף עד {expiresAt, date, full} בשעה {expiresAt, time, short}.

    אם לא ביקשתם זאת, תוכלו להתעלם מהאימייל הזה.

    – צוות RdChat
email_change_original:
  subject: אשרו שינוי כתובת אימייל ב-RdChat
  body: |-
    היי {username},

    קיבלנו בקשה לשנות את כתובת האימייל בחשבון ה-RdChat שלכם.

    כדי לאשר את השינוי, הזינו את הקוד הזה באפליקציה:

    {code}

    הקוד תקף עד {expiresAt, date, full} בשעה {expiresAt, time, short}.

    אם לא ביקשתם זאת, אבטחו את החשבון שלכם מיד.

    – צוות RdChat
email_change_revert:
  subject: כתובת האימייל שלכם ב-RdChat השתנתה
  body: |-
    היי {username},

    כתובת האימייל בחשבון ה-RdChat שלכם שונתה ל-{newEmail}.

    אם אתם ביצעתם את השינוי, לא צריך לעשות כלום. אם לא, תוכלו לבטל את השינוי ולאבטח את החשבון דרך הקישור הזה:

    {revertUrl}

    הפעולה הזו תחזיר את כתובת האימייל הקודמת, תנתק אתכם מכל המכשירים, תסיר מספרי טלפון מקושרים, תכבה אימות דו-שלבי, ותדרוש מכם לבחור סיסמה חדשה.

    – צוות הבטיחות של RdChat
email_verification:
  subject: אמתו את כתובת האימייל שלכם ב-RdChat
  body: |-
    היי {username},

    כדי לאמת את כתובת האימייל לחשבון ה-RdChat שלכם, לחצו על הקישור שלמטה:

    {verifyUrl}

    אם לא פתחתם חשבון RdChat, תוכלו להתעלם מהאימייל הזה בלי חשש.

    הקישור הזה תקף ל-24 שעות.

    – צוות RdChat
gift_chargeback_notification:
  subject: ההטבות מהמתנה שמימשתם הוסרו
  body: |-
    היי {username},

    קוד מתנה שמימשתם שולם במקור על ידי מישהו אחר. מאז בוצעה הכחשת עסקה (Chargeback) והתשלום הוחזר.

    לכן הסרנו את ההטבות שנוספו לחשבון שלכם בעת מימוש המתנה.

    אם נראה לכם שזו טעות, פנו לצוות התמיכה שלנו וצרפו כל פרט שיש לכם על קוד המתנה ועל מועד המימוש.

    – צוות RdChat
harvest_completed:
  subject: ייצוא הנתונים שלכם מ-RdChat מוכן להורדה
  body: |-
    היי {username},

    ייצוא הנתונים שלכם מוכן.

    קישור להורדה:
    {downloadUrl}

    הודעות שנכללו: {totalMessages, number}
    גודל הקובץ: {fileSizeMB, number} MB

    הקישור תקף עד {expiresAt, date, full} בשעה {expiresAt, time, short}.

    אם לא ביקשתם את הייצוא הזה, החליפו סיסמה מיד ופנו לצוות התמיכה שלנו.

    – צוות RdChat
inactivity_warning:
  subject: החשבון שלכם ב-RdChat מתוכנן למחיקה בגלל חוסר פעילות
  body: |-
    היי {username},

    לא ראינו פעילות בחשבון ה-RdChat שלכם מאז {lastActiveDate, date, full}.

    אם לא תתחברו עד {deletionDate, date, full} בשעה {deletionDate, time, short}, החשבון שלכם יימחק לצמיתות בגלל חוסר פעילות.

    התחברות כאן:
    {loginUrl}

    אם השתמשתם ב-RdChat לאחרונה, פנו לצוות התמיכה שלנו מיד.

    – צוות RdChat
ip_authorization:
  subject: אשרו התחברות מכתובת IP חדשה
  body: |-
    היי {username},

    זיהינו ניסיון התחברות לחשבון ה-RdChat שלכם מכתובת IP חדשה:

    כתובת IP: {ipAddress}
    מיקום: {location}

    אם זה הייתם אתם, אשרו את כתובת ה-IP הזו באמצעות הקישור שלמטה:

    {authUrl}

    אם לא ניסיתם להתחבר, החליפו סיסמה מיד.

    הקישור לאישור תקף ל-30 דקות.

    – צוות RdChat
password_change_verification:
  subject: אשרו את שינוי הסיסמה ב-RdChat
  body: |-
    היי {username},

    קיבלנו בקשה לשנות את הסיסמה בחשבון ה-RdChat שלכם.

    כדי לאשר את השינוי, הזינו את הקוד הזה באפליקציה:

    {code}

    הקוד תקף עד {expiresAt}.

    אם לא ביקשתם זאת, ייתכן שיש למישהו גישה לחשבון שלכם. החליפו את הסיסמה מיד והפעילו אימות דו-שלבי.

    – צוות RdChat
password_reset:
  subject: אפסו את הסיסמה שלכם ב-RdChat
  body: |-
    היי {username},

    התקבלה בקשה לאיפוס הסיסמה שלכם ב-RdChat. השתמשו בקישור שלמטה כדי לבחור סיסמה חדשה:

    {resetUrl}

    אם לא ביקשתם איפוס סיסמה, תוכלו להתעלם מהאימייל הזה בלי חשש.

    הקישור הזה תקף לשעה אחת.

    – צוות RdChat
registration_approved:
  subject: ההרשמה שלכם ל-RdChat אושרה
  body: |-
    היי {username},

    חדשות טובות: ההרשמה שלכם ל-RdChat אושרה.

    תוכלו להתחבר לאפליקציית RdChat כאן:
    {channelsUrl}

    ברוכים הבאים לקהילת RdChat.

    – צוות RdChat
report_resolved:
  subject: הדיווח שלכם ב-RdChat נבדק
  body: |-
    היי {username},

    הדיווח שלכם (מזהה: {reportId}) נבדק על ידי צוות הבטיחות שלנו.

    תשובת צוות הבטיחות:
    {publicComment}

    תודה שאתם עוזרים לשמור על RdChat בטוחה לכולם. אנחנו מתייחסים לכל דיווח ברצינות ומעריכים את התרומה שלכם לקהילה.

    אם יש לכם שאלות או חששות לגבי התוצאה, כתבו ל-safety@RdChat.app.

    – צוות הבטיחות של RdChat
scheduled_deletion_notification:
  subject: החשבון שלכם ב-RdChat מיועד למחיקה
  body: |-
    היי {username},

    החשבון שלכם ב-RdChat סומן למחיקה לצמיתות.

    תאריך מחיקה מתוכנן: {deletionDate, date, full} {deletionDate, time, short}

    {reason, select,
      null {}
      other {סיבה: {reason}}
    }

    זו פעולת אכיפה חמורה. נתוני החשבון שלכם יימחקו לצמיתות בתאריך שנקבע.

    אם לדעתכם ההחלטה שגויה, תוכלו להגיש ערעור ל-appeals@RdChat.app מהכתובת הזו.

    – צוות הבטיחות של RdChat
self_deletion_scheduled:
  subject: מחיקת חשבון ה-RdChat שלכם מתוכננת
  body: |-
    היי {username},

    ביקשתם למחוק את חשבון ה-RdChat שלכם. החשבון מתוכנן למחיקה לצמיתות בתאריך:

    {deletionDate, date, full} בשעה {deletionDate, time, short}

    אם לא ביקשתם זאת, התחברו לחשבון כדי לבטל את המחיקה. מומלץ גם להחליף סיסמה כדי לאבטח את החשבון.

    – צוות RdChat
unban_notification:
  subject: ההשעיה של החשבון שלכם ב-RdChat בוטלה
  body: |-
    היי {username},

    חדשות טובות: ההשעיה של חשבון ה-RdChat שלכם בוטלה.

    {reason, select,
      null {}
      other {סיבה: {reason}}
    }

    תוכלו להתחבר שוב לחשבון ולהמשיך להשתמש ב-RdChat כרגיל.

    – צוות הבטיחות של RdChat
