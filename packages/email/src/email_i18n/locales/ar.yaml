account_disabled_suspicious:
  subject: تم تعطيل حسابك في RdChat مؤقتا
  body: |-
    أهلا {username}،

    تم تعطيل حسابك في RdChat مؤقتا بسبب نشاط مريب.

    {reason, select,
      null {}
      other {السبب: {reason}}
    }

    لاستعادة الوصول إلى حسابك، يرجى إعادة تعيين كلمة المرور:

    {forgotUrl}

    بعد إعادة تعيين كلمة المرور، يمكنك تسجيل الدخول من جديد.

    إذا كنت تعتقد أن هذا حدث بالخطأ، فتواصل مع فريق الدعم.

    – فريق أمان RdChat
account_scheduled_deletion:
  subject: تمت جدولة حذف حسابك في RdChat
  body: |-
    أهلا {username}،

    تمت جدولة حذف حسابك نهائيا بسبب مخالفة شروط الخدمة أو إرشادات المجتمع.

    تاريخ الحذف المجدول: {deletionDate, date, full} {deletionDate, time, short}

    {reason, select,
      null {}
      other {السبب: {reason}}
    }

    هذا إجراء صارم. سيتم حذف بيانات حسابك نهائيا في التاريخ المحدد.

    يرجى مراجعة:
    - شروط الخدمة: {termsUrl}
    - إرشادات المجتمع: {guidelinesUrl}

    الاستئناف:
    إذا كنت تعتقد أن هذا القرار غير صحيح أو غير مبرر، لديك 60 يوما لتقديم استئناف إلى appeals@RdChat.app، وذلك من نفس عنوان البريد هذا.

    في الاستئناف، يرجى:
    - شرح سبب اعتقادك بأن القرار غير صحيح أو غير مبرر بوضوح
    - إرفاق أي أدلة أو سياق ذي صلة، إن أمكن

    سيقوم أحد أعضاء فريق أمان RdChat بمراجعة استئنافك، وقد يعلّق الحذف المقرر إلى حين صدور القرار النهائي.

    – فريق أمان RdChat
account_temp_banned:
  subject: تم إيقاف حسابك في RdChat مؤقتا
  body: |-
    أهلا {username}،

    تم إيقاف حسابك في RdChat مؤقتا بسبب مخالفة شروط الخدمة أو إرشادات المجتمع.

    المدة: {durationHours, plural,
      =1 {ساعة واحدة}
      other {# ساعة}
    }
    الإيقاف حتى: {bannedUntil, date, full} {bannedUntil, time, short}

    {reason, select,
      null {}
      other {السبب: {reason}}
    }

    خلال هذه الفترة، لن تتمكن من الوصول إلى حسابك.

    يرجى مراجعة:
    - شروط الخدمة: {termsUrl}
    - إرشادات المجتمع: {guidelinesUrl}

    إذا كنت تعتقد أن هذا القرار غير صحيح أو غير مبرر، يمكنك تقديم استئناف إلى appeals@RdChat.app من نفس عنوان البريد هذا. يرجى شرح سبب اعتقادك بأن القرار غير صحيح بوضوح. سنراجع استئنافك ونرد عليك بقرارنا.

    – فريق أمان RdChat
donation_confirmation:
  subject: شكراً على تبرعك ل RdChat
  body: |-
    مرحباً،

    شكراً على تبرعك ل RdChat! {interval, select,
      month {تبرعك المتكرر}
      year {تبرعك المتكرر}
      other {تبرعك لمرة واحدة}
    } تم {interval, select,
      month {إعداده}
      year {إعداده}
      other {معالجته}
    } بنجاح.

    تفاصيل التبرع:
    المبلغ: {amount} {currency} {interval, select,
      month {شهرياً}
      year {سنوياً}
      other {}
    }

    سيرسل لك Stripe إيصالاً منفصلاً مع فاتورتك بصيغة PDF قريباً. يتضمن هذا جميع تفاصيل الدفع ويمكن استخدامه للأغراض الضريبية.

    يمكنك عرض سجل تبرعاتك، وتحميل الفواتير، {interval, select,
      month {وإدارة أو إلغاء اشتراكك}
      year {وإدارة أو إلغاء اشتراكك}
      other {وإدارة التبرعات المستقبلية}
    } في أي وقت باستخدام هذا الرابط:

    {manageUrl}

    دعمك يساعد في الحفاظ على استمرار RdChat. شكراً لك!

    – فريق RdChat
donation_magic_link:
  subject: أدِر تبرعاتك ل RdChat
  body: |-
    مرحباً،

    انقر على الرابط أدناه للوصول إلى بوابة المتبرعين الخاصة بك:

    {manageUrl}

    في البوابة، يمكنك إدارة الاشتراكات، وتحميل الفواتير، وعرض سجل تبرعاتك.

    ينتهي مفعول هذا الرابط في {expiresAt, date, full} عند {expiresAt, time, short}.

    إذا لم تكن أنت من طلب هذا الرابط، يمكنك تجاهل هذه الرسالة بأمان.

    – فريق RdChat
dsa_report_verification:
  subject: أكد بريدك الإلكتروني لتقديم بلاغ DSA
  body: |-
    أهلا،

    استخدم رمز التحقق أدناه لتقديم بلاغك بموجب قانون الخدمات الرقمية (DSA) على RdChat:

    {code}

    ينتهي مفعول هذا الرمز في {expiresAt, date, full} {expiresAt, time, short}.

    إذا لم تكن أنت من طلب ذلك، يمكنك تجاهل هذه الرسالة.

    – فريق أمان RdChat
email_change_new:
  subject: أكد بريدك الإلكتروني الجديد في RdChat
  body: |-
    أهلا {username}،

    أدخل هذا الرمز في التطبيق لتأكيد بريدك الإلكتروني الجديد في RdChat:

    {code}

    ينتهي مفعول هذا الرمز في {expiresAt, date, full} {expiresAt, time, short}.

    إذا لم تكن أنت من طلب ذلك، يمكنك تجاهل هذه الرسالة.

    – فريق RdChat
email_change_original:
  subject: أكد تغيير بريدك الإلكتروني في RdChat
  body: |-
    أهلا {username}،

    تلقينا طلبا لتغيير البريد الإلكتروني على حسابك في RdChat.

    لتأكيد التغيير، أدخل هذا الرمز في التطبيق:

    {code}

    ينتهي مفعول هذا الرمز في {expiresAt, date, full} {expiresAt, time, short}.

    إذا لم تكن أنت من طلب ذلك، فقم بتأمين حسابك فورا.

    – فريق RdChat
email_change_revert:
  subject: تم تغيير بريدك الإلكتروني في RdChat
  body: |-
    أهلا {username}،

    تم تغيير البريد الإلكتروني لحسابك في RdChat إلى {newEmail}.

    إذا كنت أنت من قام بذلك، فلا حاجة لاتخاذ أي إجراء. أما إذا لم تكن أنت، فيمكنك التراجع عن التغيير وتأمين حسابك عبر هذا الرابط:

    {revertUrl}

    سيؤدي ذلك إلى استعادة بريدك الإلكتروني السابق، وتسجيل خروجك من جميع الأجهزة، وإزالة أرقام الهواتف المرتبطة، وتعطيل التحقق بخطوتين، وإلزامك بتعيين كلمة مرور جديدة.

    – فريق أمان RdChat
email_verification:
  subject: أكد عنوان بريدك الإلكتروني في RdChat
  body: |-
    أهلا {username}،

    يرجى تأكيد عنوان البريد الإلكتروني لحسابك في RdChat عبر الضغط على الرابط أدناه:

    {verifyUrl}

    إذا لم تقم بإنشاء حساب RdChat، يمكنك تجاهل هذه الرسالة بأمان.

    ينتهي مفعول هذا الرابط خلال 24 ساعة.

    – فريق RdChat
gift_chargeback_notification:
  subject: تمت إزالة المزايا المرتبطة بهديتك المستبدلة
  body: |-
    أهلا {username}،

    تم دفع قيمة رمز هدية قمت باستبداله من قبل شخص آخر، وقد تم لاحقا عكس عملية الدفع (استرجاع عبر اعتراض على الدفع).

    لذلك أزلنا المزايا التي تمت إضافتها إلى حسابك عند استبدال الهدية.

    إذا كنت تعتقد أن هذا حدث بالخطأ، فتواصل مع فريق الدعم وشارك أي تفاصيل لديك عن رمز الهدية ووقت استبداله.

    – فريق RdChat
harvest_completed:
  subject: تصدير بيانات RdChat جاهز للتحميل
  body: |-
    أهلا {username}،

    تصدير بياناتك جاهز.

    رابط التحميل:
    {downloadUrl}

    عدد الرسائل: {totalMessages, number}
    حجم الملف: {fileSizeMB, number} MB

    ينتهي مفعول هذا الرابط في {expiresAt, date, full} عند {expiresAt, time, short}.

    إذا لم تكن أنت من طلب هذا التصدير، فغيّر كلمة المرور فورا وتواصل مع فريق الدعم.

    – فريق RdChat
inactivity_warning:
  subject: تمت جدولة حذف حسابك في RdChat بسبب عدم النشاط
  body: |-
    أهلا {username}،

    لم نر أي نشاط على حسابك في RdChat منذ {lastActiveDate, date, full}.

    إذا لم تسجل الدخول قبل {deletionDate, date, full} عند {deletionDate, time, short}، فسيتم حذف حسابك نهائيا بسبب عدم النشاط.

    سجل الدخول من هنا:
    {loginUrl}

    إذا كنت قد استخدمت RdChat مؤخرا، فتواصل مع فريق الدعم فورا.

    – فريق RdChat
ip_authorization:
  subject: صرح بتسجيل دخول من عنوان IP جديد
  body: |-
    أهلا {username}،

    رصدنا محاولة تسجيل دخول إلى حسابك في RdChat من عنوان IP جديد:

    عنوان IP: {ipAddress}
    الموقع: {location}

    إذا كنت أنت من حاول تسجيل الدخول، فيرجى تصريح هذا العنوان عبر الضغط على الرابط أدناه:

    {authUrl}

    إذا لم تحاول تسجيل الدخول، فيرجى تغيير كلمة المرور فورا.

    ينتهي مفعول رابط التصريح خلال 30 دقيقة.

    – فريق RdChat
password_change_verification:
  subject: أكد تغيير كلمة مرور RdChat
  body: |-
    أهلا {username}،

    تلقينا طلبا لتغيير كلمة المرور على حسابك في RdChat.

    لتأكيد التغيير، أدخل هذا الرمز في التطبيق:

    {code}

    ينتهي مفعول هذا الرمز في {expiresAt}.

    إذا لم تكن أنت من طلب ذلك، فقد يكون شخص ما قد وصل إلى حسابك. غيّر كلمة المرور فورا وفعّل التحقق بخطوتين.

    – فريق RdChat
password_reset:
  subject: إعادة تعيين كلمة مرور RdChat
  body: |-
    أهلا {username}،

    لقد طلبت إعادة تعيين كلمة مرور RdChat. استخدم الرابط أدناه لتعيين كلمة مرور جديدة:

    {resetUrl}

    إذا لم تكن أنت من طلب إعادة التعيين، يمكنك تجاهل هذه الرسالة بأمان.

    ينتهي مفعول هذا الرابط خلال ساعة واحدة.

    – فريق RdChat
registration_approved:
  subject: تمت الموافقة على تسجيلك في RdChat
  body: |-
    أهلا {username}،

    خبر سار: تمت الموافقة على تسجيلك في RdChat.

    يمكنك الآن تسجيل الدخول إلى تطبيق RdChat من هنا:
    {channelsUrl}

    أهلا بك في مجتمع RdChat.

    – فريق RdChat
report_resolved:
  subject: تمت مراجعة بلاغك في RdChat
  body: |-
    أهلا {username}،

    تمت مراجعة بلاغك (المعرف: {reportId}) من قبل فريق الأمان.

    رد فريق الأمان:
    {publicComment}

    شكرا لمساعدتك في الحفاظ على أمان RdChat للجميع. نأخذ جميع البلاغات بجدية ونقدّر مساهمتك في المجتمع.

    إذا كانت لديك أي أسئلة أو مخاوف بشأن هذه النتيجة، فتواصل معنا على safety@RdChat.app.

    – فريق أمان RdChat
scheduled_deletion_notification:
  subject: تمت جدولة حذف حسابك في RdChat
  body: |-
    أهلا {username}،

    تمت جدولة حذف حسابك في RdChat نهائيا.

    تاريخ الحذف المجدول: {deletionDate, date, full} {deletionDate, time, short}

    {reason, select,
      null {}
      other {السبب: {reason}}
    }

    هذا إجراء صارم. سيتم حذف بيانات حسابك نهائيا في التاريخ المحدد.

    إذا كنت تعتقد أن هذا القرار غير صحيح، يمكنك تقديم استئناف إلى appeals@RdChat.app من نفس عنوان البريد هذا.

    – فريق أمان RdChat
self_deletion_scheduled:
  subject: تمت جدولة حذف حسابك في RdChat
  body: |-
    أهلا {username}،

    لقد طلبت حذف حسابك في RdChat. تمت جدولة حذف حسابك نهائيا في:

    {deletionDate, date, full} عند {deletionDate, time, short}

    إذا لم تكن أنت من طلب ذلك، فسجل الدخول إلى حسابك لإلغاء الحذف. نوصي أيضا بتغيير كلمة المرور لتأمين حسابك.

    – فريق RdChat
unban_notification:
  subject: تم رفع إيقاف حسابك في RdChat
  body: |-
    أهلا {username}،

    خبر سار: تم رفع إيقاف حسابك في RdChat.

    {reason, select,
      null {}
      other {السبب: {reason}}
    }

    يمكنك الآن تسجيل الدخول من جديد ومتابعة استخدام RdChat.

    – فريق أمان RdChat
